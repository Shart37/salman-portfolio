<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salman Ahmed — Photography Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            color: #111;
            line-height: 1.4;
        }

        /* Header */
        .header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 450;
            letter-spacing: -0.02em;
            color: #111;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 0.95rem;
            color: #666;
            letter-spacing: 0.3px;
        }

        /* Category Navigation */
        .categories {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #eee;
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .cat-btn {
            background: none;
            border: none;
            font-size: 0.85rem;
            font-weight: 450;
            letter-spacing: 0.5px;
            color: #888;
            cursor: pointer;
            padding: 0.4rem 0;
            transition: color 0.2s;
            text-transform: uppercase;
        }

        .cat-btn:hover {
            color: #111;
        }

        .cat-btn.active {
            color: #111;
            border-bottom: 2px solid #111;
        }

        /* Gallery Grid — Masonry style like Wix */
        .gallery {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            column-count: 3;
            column-gap: 1.2rem;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 1.2rem;
            position: relative;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: all 0.25s ease;
        }

        /* Hover effect — like Wix portfolio */
        .gallery-item:hover img {
            opacity: 0.92;
        }

        /* Optional overlay on hover */
        .gallery-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            transition: background 0.2s;
            pointer-events: none;
        }

        .gallery-item:hover::after {
            background: rgba(0,0,0,0.03);
        }

        /* Lightbox Modal (click to enlarge) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 35px;
            color: white;
            font-size: 2.5rem;
            font-weight: 300;
            cursor: pointer;
            font-family: monospace;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 3rem 2rem;
            border-top: 1px solid #eee;
            margin-top: 1rem;
            font-size: 0.75rem;
            color: #aaa;
            letter-spacing: 0.3px;
        }

        /* Responsive */
        @media (max-width: 1000px) {
            .gallery { column-count: 2; }
        }
        @media (max-width: 600px) {
            .gallery { column-count: 1; padding: 0 1rem; }
            .header h1 { font-size: 2rem; }
            .categories { gap: 1rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Salman Ahmed</h1>
    <p>Photography — Architecture · Real Estate · Documentary</p>
</div>

<div class="categories">
    <button class="cat-btn active" data-cat="all">All Work</button>
    <button class="cat-btn" data-cat="realestate">Real Estate</button>
    <button class="cat-btn" data-cat="architecture">Architecture</button>
    <button class="cat-btn" data-cat="wedding">Wedding</button>
    <button class="cat-btn" data-cat="urban">Urban / Rooftops</button>
</div>

<div class="gallery" id="gallery"></div>

<div class="footer">
    © Salman Ahmed — Manchester / UK
</div>

<div class="modal" id="lightbox">
    <span class="modal-close">&times;</span>
    <img id="lightbox-img" src="" alt="">
</div>

<script>
    // --------------------------------------------------------------
    // ORGANIZED IMAGES BY CATEGORY
    // --------------------------------------------------------------
    const imagesData = [
        // REAL ESTATE (img1,3,4,5,8,10,11 + Image10 is main featured)
        { file: "img10.jpg", cat: "realestate", featured: true, alt: "Modern interior" },
        { file: "img1.jpg", cat: "realestate", alt: "Property view 1" },
        { file: "img3.jpg", cat: "realestate", alt: "Property view 2" },
        { file: "img4.jpg", cat: "realestate", alt: "Living space" },
        { file: "img5.jpg", cat: "realestate", alt: "Kitchen detail" },
        { file: "img8.jpg", cat: "realestate", alt: "Bedroom view" },
        { file: "img11.jpg", cat: "realestate", alt: "Exterior shot" },
        
        // ARCHITECTURE (img2, img6, img7, plus others that fit)
        { file: "img2.jpg", cat: "architecture", alt: "Building facade" },
        { file: "img6.jpg", cat: "architecture", alt: "Structural detail" },
        { file: "img7.jpg", cat: "architecture", alt: "Geometric lines" },
        { file: "UOM.jpg", cat: "architecture", alt: "University building" },
        { file: "climbing the light tower.jpg", cat: "architecture", alt: "Light tower climb" },
        
        // WEDDING (img9)
        { file: "img9.jpg", cat: "wedding", alt: "Wedding ceremony" },
        
        // URBAN / ROOFTOPS (the rest of your photos)
        { file: "view of shoes on roof.jpg", cat: "urban", alt: "Shoes on rooftop" },
        { file: "londong roof aj.jpg", cat: "urban", alt: "London rooftop" },
        { file: "sunrise manchester crane.jpg", cat: "urban", alt: "Sunrise Manchester" },
        { file: "IMG_7719-Edit.jpg", cat: "urban", alt: "City view" },
        { file: "crane sunrise.jpg", cat: "urban", alt: "Crane at dawn" },
        { file: "joe on slanted roof.jpg", cat: "urban", alt: "Joe on roof" },
        { file: "you know where this is manchester.jpg", cat: "urban", alt: "Manchester landmark" },
        { file: "missed my bus manchester.jpg", cat: "urban", alt: "Street scene" },
        { file: "bikes at sunset enhanced.jpg", cat: "urban", alt: "Bikes sunset" },
        { file: "snow tram.jpg", cat: "urban", alt: "Tram in snow" },
        { file: "snow tram 2.jpg", cat: "urban", alt: "Snow tram 2" },
        { file: "roof near piccadily.jpg", cat: "urban", alt: "Piccadilly roof" },
        { file: "stewart crane sunrise.jpg", cat: "urban", alt: "Stewart crane" },
        { file: "car driveshaft skoda fabia mk 2 1.4 tdi.jpg", cat: "urban", alt: "Car detail" }
    ];

    // Put img10.jpg at the FRONT of real estate (main image)
    const realEstateItems = imagesData.filter(i => i.cat === "realestate");
    const otherItems = imagesData.filter(i => i.cat !== "realestate");
    
    // Sort real estate so img10 comes first
    realEstateItems.sort((a,b) => {
        if (a.file === "img10.jpg") return -1;
        if (b.file === "img10.jpg") return 1;
        return 0;
    });
    
    const finalImageList = [...realEstateItems, ...otherItems];

    // Function to render gallery based on selected category
    function renderGallery(category) {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = '';
        
        let filtered = finalImageList;
        if (category !== 'all') {
            filtered = finalImageList.filter(item => item.cat === category);
        }
        
        if (filtered.length === 0) {
            gallery.innerHTML = '<div style="text-align:center; padding: 60px; color:#999;">No images in this category yet.</div>';
            return;
        }
        
        filtered.forEach(item => {
            const encodedFile = encodeURIComponent(item.file);
            const imgPath = `images/${encodedFile}`;
            
            const div = document.createElement('div');
            div.className = 'gallery-item';
            
            const img = document.createElement('img');
            img.src = imgPath;
            img.alt = item.alt || item.file;
            img.loading = 'lazy';
            
            // Add click to open lightbox
            img.addEventListener('click', (e) => {
                e.stopPropagation();
                openLightbox(imgPath, img.alt);
            });
            
            div.appendChild(img);
            gallery.appendChild(div);
        });
    }
    
    // Lightbox functions
    const modal = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    
    function openLightbox(src, alt) {
        lightboxImg.src = src;
        lightboxImg.alt = alt;
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    
    function closeLightbox() {
        modal.style.display = 'none';
        document.body.style.overflow = '';
        lightboxImg.src = '';
    }
    
    // Event listeners
    modal.addEventListener('click', (e) => {
        if (e.target === modal || e.target.classList.contains('modal-close')) {
            closeLightbox();
        }
    });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.style.display === 'flex') {
            closeLightbox();
        }
    });
    
    // Category buttons
    const buttons = document.querySelectorAll('.cat-btn');
    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const cat = btn.getAttribute('data-cat');
            renderGallery(cat);
            
            // Smooth scroll to top of gallery
            document.querySelector('.gallery').scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
    });
    
    // Initial render (All)
    renderGallery('all');
</script>
</body>
</html>
